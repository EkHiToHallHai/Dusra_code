ekf_filter_node:
    ros__parameters:
        frequency: 50.0        # Output rate in Hz
        two_d_mode: true       # Constrains motion to the 2D plane (floor robots)
        publish_tf: true       # Publishes the odom -> base_footprint transform

        map_frame: map
        odom_frame: odom
        base_link_frame: base_footprint
        world_frame: odom

        odom0: odom/unfiltered
        odom0_config: [false, false, false,  # x, y, z position
                       false, false, false,  # roll, pitch, yaw
                       true,  true,  false,  # vx, vy, vz  <-- use wheel velocities
                       false, false, true,   # vroll, vpitch, vyaw  <-- use yaw rate
                       false, false, false]  # ax, ay, az

        imu0: imu/data
        imu0_config: [false, false, false,
                      false, false, false,
                      false, false, false,
                      false, false, true,   # vyaw  <-- fuse IMU yaw rate
                      false, false, false]

ekf_filter_node_map:
  ros__parameters:
    frequency: 50.0
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: map

    odom0: /odometry/gps
    odom0_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom0_relative:   false
    odom0_queue_size: 10